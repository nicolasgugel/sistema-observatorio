name: Deploy Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  VERCEL_ORG_ID: team_lVNCt29dONZSV1ueq9hrkbWT
  VERCEL_PROJECT_ID: prj_MG0KFrk0CIBiN9rr9rRti1J8kcvT
  VERCEL_SCOPE: nicolasgugelg-6760s-projects

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv for Vercel Python builds
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Pull Vercel environment
        run: |
          npx vercel pull --yes --environment=production --scope="${{ env.VERCEL_SCOPE }}" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel deployment
        run: |
          npx vercel build --prod --scope="${{ env.VERCEL_SCOPE }}" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production build
        run: |
          npx vercel deploy --prebuilt --prod --scope="${{ env.VERCEL_SCOPE }}" --token="${{ secrets.VERCEL_TOKEN }}"
