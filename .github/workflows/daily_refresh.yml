name: Daily Refresh

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: daily-refresh
  cancel-in-progress: false

permissions:
  contents: write

env:
  VERCEL_ORG_ID: team_lVNCt29dONZSV1ueq9hrkbWT
  VERCEL_PROJECT_ID: prj_MG0KFrk0CIBiN9rr9rRti1J8kcvT

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve 08:00 Europe/Madrid slot
        id: madrid_slot
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          schedule="${{ github.event.schedule }}"
          cron_minute="${schedule%% *}"
          remainder="${schedule#* }"
          cron_hour="${remainder%% *}"
          scheduled_date_utc="$(date -u +%F)"
          madrid_slot="$(TZ=Europe/Madrid date -d "${scheduled_date_utc} ${cron_hour}:${cron_minute} UTC" +%H:%M)"

          echo "Triggered cron: ${schedule}"
          echo "Scheduled Madrid slot: ${madrid_slot}"

          if [[ "$madrid_slot" == "08:00" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=scheduled_8am_madrid" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=not_8am_madrid_slot" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip duplicate DST slot
        if: steps.madrid_slot.outputs.should_run != 'true'
        run: |
          echo "Skipping scheduled run outside 08:00 Europe/Madrid."

      - name: Checkout repository
        if: steps.madrid_slot.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.madrid_slot.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.madrid_slot.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          python -m pip install -r requirements.full.txt
          python -m playwright install --with-deps chromium
          python -m playwright install-deps firefox
          scrapling install
          camoufox fetch

      - name: Run daily refresh
        if: steps.madrid_slot.outputs.should_run == 'true'
        env:
          OBSERVATORIO_REFRESH_CRON: "08:00 Europe/Madrid"
          OBSERVATORIO_REFRESH_TIMEZONE: "Europe/Madrid"
          OBSERVATORIO_HISTORY_RETENTION: "90"
        run: |
          python scripts/run_daily_refresh.py

      - name: Commit published data
        id: publish_data
        if: steps.madrid_slot.outputs.should_run == 'true'
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- data/current data/history master_prices.csv)" ]]; then
            echo "No hay cambios que publicar."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current data/history master_prices.csv
          git add -f output/latest_prices.json output/latest_prices.csv output/unified_last_scrapes_with_book.csv output/price_comparison_live.html output/master_prices.csv
          git commit -m "chore: daily price refresh"
          git push
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.madrid_slot.outputs.should_run == 'true' && steps.publish_data.outputs.has_changes == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Pull Vercel environment
        if: steps.madrid_slot.outputs.should_run == 'true' && steps.publish_data.outputs.has_changes == 'true'
        run: |
          npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel deployment
        if: steps.madrid_slot.outputs.should_run == 'true' && steps.publish_data.outputs.has_changes == 'true'
        run: |
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy refreshed data to Vercel
        if: steps.madrid_slot.outputs.should_run == 'true' && steps.publish_data.outputs.has_changes == 'true'
        run: |
          npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
