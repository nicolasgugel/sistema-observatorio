name: Daily Refresh

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve 09:00 Europe/Madrid slot
        id: madrid_slot
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          madrid_hour="$(TZ=Europe/Madrid date +%H)"
          if [[ "$madrid_hour" == "09" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=scheduled_9am_madrid" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=not_9am_madrid" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip duplicate DST slot
        if: steps.madrid_slot.outputs.should_run != 'true'
        run: |
          echo "Skipping scheduled run outside 09:00 Europe/Madrid."

      - name: Checkout repository
        if: steps.madrid_slot.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.madrid_slot.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.madrid_slot.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.full.txt
          python -m playwright install --with-deps chromium

      - name: Run daily refresh
        if: steps.madrid_slot.outputs.should_run == 'true'
        env:
          OBSERVATORIO_REFRESH_CRON: "09:00 Europe/Madrid"
          OBSERVATORIO_REFRESH_TIMEZONE: "Europe/Madrid"
          OBSERVATORIO_HISTORY_RETENTION: "90"
        run: |
          python scripts/run_daily_refresh.py

      - name: Commit published data
        if: steps.madrid_slot.outputs.should_run == 'true'
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- data/current data/history output master_prices.csv)" ]]; then
            echo "No hay cambios que publicar."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current data/history output master_prices.csv
          git commit -m "chore: daily price refresh"
          git push
