name: Daily Refresh

on:
  schedule:
    - cron: "13 7 * * *"
  workflow_dispatch:

concurrency:
  group: daily-refresh
  cancel-in-progress: false

permissions:
  contents: write

env:
  VERCEL_ORG_ID: team_lVNCt29dONZSV1ueq9hrkbWT
  VERCEL_PROJECT_ID: prj_MG0KFrk0CIBiN9rr9rRti1J8kcvT

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          python -m pip install -r requirements.full.txt
          python -m playwright install --with-deps chromium
          python -m playwright install-deps firefox
          scrapling install
          camoufox fetch

      - name: Run daily refresh
        env:
          OBSERVATORIO_REFRESH_TIMEZONE: "Europe/Madrid"
          OBSERVATORIO_HISTORY_RETENTION: "90"
        run: |
          python scripts/run_daily_refresh.py

      - name: Commit published data
        id: publish_data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current data/history master_prices.csv
          git add -f output/latest_prices.json output/latest_prices.csv output/unified_last_scrapes_with_book.csv output/price_comparison_live.html output/master_prices.csv
          git commit --allow-empty -m "chore: daily price refresh"
          git push
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Pull Vercel environment
        run: |
          npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel deployment
        run: |
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy refreshed data to Vercel
        run: |
          npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
